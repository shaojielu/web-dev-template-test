name: Add to Project

on:
  pull_request_target:
  issues:
    types:
      - opened
      - reopened

jobs:
  add-to-project:
    # Only runs if PROJECT_URL variable is configured
    if: vars.PROJECT_URL != ''
    name: Add to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          # Set PROJECT_URL as a repository variable, e.g. https://github.com/orgs/<org>/projects/<num>
          project-url: ${{ vars.PROJECT_URL }}
          github-token: ${{ secrets.PROJECTS_TOKEN }}
